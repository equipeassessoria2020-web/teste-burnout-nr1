<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramenta de Triagem - Estresse e Burnout (NR-1)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #2b2d42;
            line-height: 1.6;
            padding-bottom: 3rem;
        }
        header {
            background: linear-gradient(135deg, #1d3557, #457b9d);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        header p {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        .badge-nr1 {
            background-color: #e63946;
            color: white;
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 0.8rem;
        }
        .container {
            max-width: 650px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }
        .pergunta {
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #edf2f4;
            padding-bottom: 1.5rem;
        }
        .pergunta p {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1d3557;
        }
        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .opcao {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #e5e5e5;
            transition: all 0.2s;
        }
        .opcao:hover {
            background: #edf2f4;
            border-color: #457b9d;
        }
        .opcao input {
            margin-right: 10px;
            accent-color: #1d3557;
        }
        .btn-enviar {
            background-color: #e63946;
            color: white;
            border: none;
            width: 100%;
            padding: 1.2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
            transition: background 0.2s;
        }
        .btn-enviar:hover {
            background-color: #c1121f;
        }
        #resultado {
            display: none;
        }
        .resultado-titulo {
            font-size: 1.5rem;
            color: #1d3557;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
        }
        .score-box {
            background: #f1faee;
            border: 2px dashed #457b9d;
            padding: 1rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            color: #1d3557;
        }
        /* AJUSTE DO BLOCO FOCADO EM CONHECIMENTO E NA LEI QUE PROTEGE O TRABALHADOR */
        .box-download {
            background-color: #fff;
            border: 2px solid #1d3557;
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .box-download h3 {
            color: #1d3557;
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        .box-download p {
            color: #333;
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }
        .card-ebook {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #e63946;
            text-align: left;
        }
        .btn-download {
            background-color: #e63946;
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #c1121f;
        }
    </style>
</head>
<body>

    <header>
        <h1>Triagem de Estresse Ocupacional</h1>
        <p>Apoio preventivo de bem-estar e riscos psicossociais em conformidade com as diretrizes de saúde do trabalhador.</p>
        <div class="badge-nr1">Gerenciamento de Riscos - NR-1</div>
